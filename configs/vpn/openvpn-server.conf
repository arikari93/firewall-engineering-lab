# OpenVPN Server Configuration — pfSense Firewall Engineering Lab
# Generated from pfSense VPN > OpenVPN > Servers
# Version: OpenVPN 2.6.x (bundled with pfSense CE 2.7.2)
# Last Updated: 2026-02-01
# Author: Ari Said
#
# NOTE: Sensitive values (certificates, keys, tls-crypt key) are redacted.
#       See docs/VPN_CONFIGURATION.md for full setup guide.
#       To use this config: replace [REDACTED] placeholders with
#       values exported from pfSense > VPN > OpenVPN > Client Export

# ── Server Settings ───────────────────────────────────────────────────────────
mode server
tls-server
port 1194
proto udp4
dev tun

# ── Cryptography ─────────────────────────────────────────────────────────────
# TLS 1.3 minimum — disables TLS 1.0/1.1/1.2 for the control channel
tls-version-min 1.3

# Data channel cipher negotiation (OpenVPN 2.5+ directive).
# AES-256-GCM is an AEAD cipher — it provides its own authentication,
# so no separate data-channel HMAC is required.
data-ciphers AES-256-GCM:AES-128-GCM
data-ciphers-fallback AES-256-GCM

# 'auth' here applies only to the TLS control-channel HMAC (see tls-crypt below).
auth SHA256

# ── Certificates ─────────────────────────────────────────────────────────────
ca   /etc/openvpn/server/ca.crt         # Lab-Internal-CA (ECDSA P-384)
cert /etc/openvpn/server/server.crt     # openvpn-server cert (CN: vpn.lab.internal)
key  /etc/openvpn/server/server.key     # [REDACTED — never committed to repo]

# Modern OpenVPN with an ECDSA certificate negotiates ECDHE automatically.
# Static Diffie-Hellman parameters are no longer required.
dh none

# Restrict ECDH curve used for key exchange
ecdh-curve secp384r1

# Require client certificates (mutual TLS)
remote-cert-tls client

# ── Control Channel Protection ────────────────────────────────────────────────
# tls-crypt encrypts AND authenticates the TLS control channel (supersedes
# tls-auth, which only HMACs it). Hides the OpenVPN handshake from passive
# observers and blocks unauthenticated packets before they reach the TLS stack.
tls-crypt /etc/openvpn/server/tls-crypt.key
# [tls-crypt.key REDACTED — treated as a secret, never committed to repo]

# ── Network / Routing ─────────────────────────────────────────────────────────
# VPN tunnel subnet
server 10.8.0.0 255.255.255.0

# Push internal routes to VPN clients (split tunnel)
# Client routes RFC1918 lab ranges through the VPN; internet traffic goes direct.
push "route 192.168.10.0 255.255.255.0"   # Trusted LAN
push "route 192.168.20.0 255.255.255.0"   # IoT VLAN
push "route 10.0.30.0 255.255.255.0"      # DMZ
push "route 10.0.40.0 255.255.255.0"      # Security Lab
push "route 10.0.99.0 255.255.255.0"      # Management

# Push internal DNS resolver to clients
push "dhcp-option DNS 10.8.0.1"           # pfSense Unbound via VPN interface
push "dhcp-option DOMAIN lab.internal"

# Block outside DNS on Windows clients (prevents DNS leaks)
# Forces DNS queries through the tunnel at the driver level.
push "block-outside-dns"

# ── Connection Settings ───────────────────────────────────────────────────────
# Maximum concurrent VPN clients
max-clients 5

# Keep connections alive — ping every 10s, restart after 60s with no response
keepalive 10 60

# Persist key/tun across restarts (avoids re-reading key files after privilege drop)
persist-key
persist-tun

# Drop OpenVPN process privileges after startup
user nobody
group nobody

# ── Logging ──────────────────────────────────────────────────────────────────
# Verbosity: 3 = standard, 5 = debug (keep at 3 in production)
verb 3

# Log connected clients with timestamps
status /var/log/openvpn-status.log 30

# Client connection/disconnection events → pfSense syslog → Wazuh
log-append /var/log/openvpn.log

# ── Security Hardening ────────────────────────────────────────────────────────
# Revoke compromised client certificates via CRL
crl-verify /etc/openvpn/server/crl.pem

# Client isolation: this lab does NOT enable 'client-to-client'.
# With the directive omitted (default), VPN clients cannot reach each other —
# each client can only reach pushed lab subnets, not other VPN peers.
# (To intentionally allow peer-to-peer VPN traffic you would add: client-to-client)

# Explicit exit notification — clients notify server on disconnect
explicit-exit-notify 1

# Replay attack protection (default: 64-packet sliding window)
replay-window 64 15
