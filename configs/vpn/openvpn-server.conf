# OpenVPN Server Configuration — pfSense Firewall Engineering Lab
# Generated from pfSense VPN > OpenVPN > Servers
# Version: OpenVPN 2.6.x (bundled with pfSense CE 2.7.2)
# Last Updated: 2026-02-01
# Author: Ari Said
#
# NOTE: Sensitive values (certificates, keys, PSK) are redacted.
#       See docs/VPN_CONFIGURATION.md for full setup guide.
#       To use this config: replace [REDACTED] placeholders with
#       values exported from pfSense > VPN > OpenVPN > Client Export

# ── Server Settings ───────────────────────────────────────────────────────────
mode server
tls-server
port 1194
proto udp4
dev tun

# ── Cryptography ─────────────────────────────────────────────────────────────
# TLS 1.3 minimum — disables TLS 1.0/1.1/1.2
tls-version-min 1.3

# AES-256-GCM: authenticated encryption (AEAD) — no separate HMAC needed
cipher AES-256-GCM
ncp-ciphers AES-256-GCM

# Data channel authentication
auth SHA512

# TLS HMAC authentication (pre-shared key) — prevents unauthenticated
# SSL/TLS handshakes from reaching the OpenVPN process (DDoS mitigation)
tls-auth [REDACTED_TLS_AUTH_KEY] 0

# Diffie-Hellman parameters (4096-bit)
dh /etc/openvpn/dh4096.pem

# ── Certificates ─────────────────────────────────────────────────────────────
ca   /etc/openvpn/server/ca.crt         # Lab-Internal-CA
cert /etc/openvpn/server/server.crt     # openvpn-server cert (CN: vpn.lab.internal)
key  /etc/openvpn/server/server.key     # [REDACTED — never committed to repo]

# Require client certificates (mutual TLS)
remote-cert-tls client

# ── Network / Routing ─────────────────────────────────────────────────────────
# VPN tunnel subnet
server 10.8.0.0 255.255.255.0

# Push internal routes to VPN clients (split tunnel)
# Client will route RFC1918 lab ranges through VPN; internet goes direct
push "route 192.168.10.0 255.255.255.0"   # Trusted LAN
push "route 192.168.20.0 255.255.255.0"   # IoT VLAN
push "route 10.0.30.0 255.255.255.0"      # DMZ
push "route 10.0.40.0 255.255.255.0"      # Security Lab
push "route 10.0.99.0 255.255.255.0"      # Management

# Push internal DNS resolver to clients
push "dhcp-option DNS 10.8.0.1"           # pfSense Unbound via VPN interface
push "dhcp-option DOMAIN lab.internal"

# Block outside DNS on Windows clients (prevents DNS leaks)
# Forces DNS queries through tunnel at driver level
push "block-outside-dns"

# ── Connection Settings ───────────────────────────────────────────────────────
# Maximum concurrent VPN clients
max-clients 5

# Keep connections alive — sends ping every 10s, restart after 60s no response
keepalive 10 60

# Persist key/tun across restarts (avoids re-reading key files)
persist-key
persist-tun

# Reduce OpenVPN process privileges after startup
user nobody
group nobody

# ── Logging ──────────────────────────────────────────────────────────────────
# Verbosity: 3 = standard, 5 = debug (set to 3 in production)
verb 3

# Log connected clients with timestamps
status /var/log/openvpn-status.log 30

# Client connection/disconnection events → pfSense syslog → Wazuh
log-append /var/log/openvpn.log

# ── Security Hardening ────────────────────────────────────────────────────────
# Revoke compromised client certificates via CRL
crl-verify /etc/openvpn/server/crl.pem

# Prevent clients from seeing each other (client isolation)
client-to-client

# Explicit exit notification — clients notify server on disconnect
explicit-exit-notify 1

# Replay attack protection (default: 64-packet window)
replay-window 64 15
