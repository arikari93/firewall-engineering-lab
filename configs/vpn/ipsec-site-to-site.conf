# IPSec IKEv2 Site-to-Site Configuration
# pfSense CE 2.7.2 — strongSwan backend
# Tunnel: Primary Lab ↔ Remote VPS (pfSense)
# Author: Ari Said | Last Updated: 2026-02-15

# ── Topology ──────────────────────────────────────────────────────────────────
#
#  Primary Lab (Site A)                    Remote VPS (Site B)
#  ────────────────────                    ─────────────────────
#  WAN: [SITE_A_WAN_IP]    ═══ IPSec ═══  WAN: [SITE_B_WAN_IP]
#  Local: 10.0.40.0/24                    Remote: 10.1.0.0/24
#  (Security Lab VLAN)                    (VPS internal range)
#
# Use case: Extend Security Lab monitoring to cloud VPS
#           Allows Wazuh Manager (10.0.40.50) to receive
#           agents from remote VPS without exposing WAN

# ════════════════════════════════════════════════════════════════
# PHASE 1 — IKEv2 (ISAKMP Security Association)
# pfSense UI: VPN > IPsec > Tunnels > Phase 1
# ════════════════════════════════════════════════════════════════

[PHASE_1]
ikev2                    = yes          # IKEv2 only (more secure than IKEv1)
local_addrs              = [SITE_A_WAN_IP]
remote_addrs             = [SITE_B_WAN_IP]

# Authentication — Pre-Shared Key (lab use)
# Production recommendation: switch to RSA/ECDSA certificates (mutual auth).
# A weak or leaked PSK undermines the whole tunnel regardless of cipher.
authby                   = secret
# PSK stored in pfSense > VPN > IPsec > Pre-Shared Keys [REDACTED]
# Use a high-entropy PSK (>= 32 random bytes) if PSK auth is retained.

# IKE (Phase 1) encryption proposals — modern crypto.
# AES-256-GCM (AEAD) for confidentiality+integrity; PRF SHA-384; key
# exchange over ECP groups (ECDH P-384 / P-256). DH Group 14 (modp2048)
# is dropped as a primary — it is only an acceptable floor, not a 2026
# target. ecp384 is the preferred group; ecp256 is listed as fallback.
proposals = aes256gcm16-prfsha384-ecp384,aes256gcm16-prfsha384-ecp256

# SA lifetime (rekey before expiry)
ikelifetime              = 28800       # 8 hours
rekey_time               = 25200       # Rekey at 7 hours (before expiry)

# Dead Peer Detection — detect failed tunnels and renegotiate
dpdaction                = restart
dpddelay                 = 30s
dpdtimeout               = 120s

# Initiation — Site A initiates; Site B responds
auto                     = start

# ════════════════════════════════════════════════════════════════
# PHASE 2 — ESP (Data Security Association)
# pfSense UI: VPN > IPsec > Tunnels > Phase 2
# ════════════════════════════════════════════════════════════════

[PHASE_2_CHILD_SA]
mode                     = tunnel

# Traffic selectors (subnets to encrypt)
local_ts                 = 10.0.40.0/24   # Security Lab VLAN (Site A)
remote_ts                = 10.1.0.0/24    # Remote VPS network (Site B)

# ESP (Phase 2) encryption proposals — AES-256-GCM with an ECP group for
# Perfect Forward Secrecy. The ECP PFS group is what makes each Child SA
# rekey independent, so a single key compromise cannot decrypt past traffic.
esp_proposals            = aes256gcm16-ecp384,aes256gcm16-ecp256

# SA lifetime
lifetime                 = 3600           # 1 hour
rekey_time               = 3000           # Rekey at 50 minutes

# Perfect Forward Secrecy — new ECDH exchange per Phase 2 rekey.
# ecp384 (NIST P-384) replaces the dated modp2048 / DH Group 14.
pfs_group                = ecp384         # ECP Group 20 (384-bit ECDH)

# ════════════════════════════════════════════════════════════════
# PFROUTE — Static route for Site B traffic via IPSec
# pfSense UI: System > Routing > Static Routes
# ════════════════════════════════════════════════════════════════

# Route 10.1.0.0/24 via IPSec tunnel interface
# Automatically added by pfSense when Phase 2 SA is established
# Manual equivalent (pfSense console):
#   route add -net 10.1.0.0/24 -interface ipsec0

# ════════════════════════════════════════════════════════════════
# FIREWALL RULES — Required for IPSec traffic
# pfSense auto-creates these; documented here for clarity
# ════════════════════════════════════════════════════════════════

# WAN rules (allow IKE + ESP from Site B):
#   pass in  quick on em0 proto udp from [SITE_B_WAN_IP] to [SITE_A_WAN_IP] port 500  # IKE
#   pass in  quick on em0 proto udp from [SITE_B_WAN_IP] to [SITE_A_WAN_IP] port 4500 # NAT-T
#   pass in  quick on em0 proto esp from [SITE_B_WAN_IP] to [SITE_A_WAN_IP]           # ESP

# IPSec interface rule (traffic inside tunnel):
#   pass in  quick on ipsec0 from 10.1.0.0/24 to 10.0.40.0/24  # Remote VPS → SecLab
#   pass out quick on ipsec0 from 10.0.40.0/24 to 10.1.0.0/24  # SecLab → Remote VPS

# ════════════════════════════════════════════════════════════════
# VALIDATION & TROUBLESHOOTING
# ════════════════════════════════════════════════════════════════

# Check Phase 1 SA status:
#   pfSense UI: Status > IPsec > Overview
#   Console: ipsec statusall | grep -A5 "ESTABLISHED"

# Check Phase 2 SA (installed SAs):
#   Console: ipsec statusall | grep -A5 "INSTALLED"

# View IKE daemon logs:
#   clog -f /var/log/ipsec.log

# Test connectivity through tunnel:
#   ping -S 10.0.40.50 10.1.0.1       # From SecLab to remote VPS gateway
#   ssh admin@10.1.0.1                 # SSH to remote host via tunnel

# Common failure: Phase 1 not establishing
#   → Verify PSK matches on both sides
#   → Verify DH/ECP group and encryption proposals match exactly on both peers
#   → Check WAN firewall rules allow UDP 500/4500 from remote WAN IP

# Common failure: Phase 2 installed but traffic not passing
#   → Verify traffic selectors match exactly (both sides must mirror each other)
#   → Check IPSec interface firewall rules (pfSense creates these automatically)
#   → Verify routing: netstat -rn | grep 10.1.0.0
